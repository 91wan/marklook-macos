name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow YAML
        run: ruby -e "require 'yaml'; YAML.load_file('.github/workflows/ci.yml')"
      - name: Validate required scaffold files
        run: |
          test -f README.md
          test -f LICENSE
          test -f PRIVACY.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CODEOWNERS
          test -f project.yml
          test -f Docs/architecture.md
          test -f Docs/review-checklist.md
          test -f Docs/manual-validation.md
          test -f Docs/adr/ADR-0001-modern-quicklook-extension.md
          test -f Docs/adr/ADR-0002-markdown-engine.md
          test -f Docs/adr/ADR-0003-security-model.md
          test -f MarkLookApp/Info.plist
          test -f PreviewExtensionTests/Info.plist
          test -f MarkLookApp/MarkLook.entitlements
          test -f Scripts/validate-supported-types.sh
          test -f Scripts/validate-built-bundle.sh
          test -f Scripts/validate-renderer-security.sh
      - name: Validate plists and entitlements
        run: |
          plutil -lint MarkLookApp/Info.plist
          plutil -lint PreviewExtensionTests/Info.plist
          plutil -lint MarkLookApp/MarkLook.entitlements
          plutil -lint PreviewExtension/Info.plist
          plutil -lint PreviewExtension/PreviewExtension.entitlements
          plutil -lint ThumbnailExtension/Info.plist
          plutil -lint ThumbnailExtension/ThumbnailExtension.entitlements
          /usr/libexec/PlistBuddy -c 'Print :com.apple.security.app-sandbox' MarkLookApp/MarkLook.entitlements | grep -q true
          /usr/libexec/PlistBuddy -c 'Print :com.apple.security.app-sandbox' PreviewExtension/PreviewExtension.entitlements | grep -q true
          /usr/libexec/PlistBuddy -c 'Print :com.apple.security.app-sandbox' ThumbnailExtension/ThumbnailExtension.entitlements | grep -q true
          Scripts/validate-supported-types.sh
          ! grep -R "com.apple.security.network.client" . --include="*.entitlements"
          ! grep -R "public.plain-text" PreviewExtension ThumbnailExtension
      - name: Validate shell scripts
        run: |
          sh -n Scripts/bootstrap.sh
          sh -n Scripts/reset-quicklook.sh
          sh -n Scripts/diagnose-file.sh
          sh -n Scripts/package-debug.sh
          sh -n Scripts/validate-supported-types.sh
          sh -n Scripts/validate-built-bundle.sh
          sh -n Scripts/validate-renderer-security.sh
      - name: Check whitespace
        run: git diff --check
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Validate XcodeGen spec syntax
        run: xcodegen dump --spec project.yml >/tmp/marklook-project-dump.yml
      - name: Generate Xcode project
        run: xcodegen generate
      - name: List Xcode project
        run: xcodebuild -project MarkLook.xcodeproj -list
      - name: Test MarkLook preview extension
        run: |
          xcodebuild \
            -project MarkLook.xcodeproj \
            -scheme MarkLook \
            -configuration Debug \
            -derivedDataPath .build/DerivedData \
            -only-testing:MarkLookPreviewTests \
            CODE_SIGNING_ALLOWED=NO \
            test
      - name: Build MarkLook
        run: |
          xcodebuild \
            -project MarkLook.xcodeproj \
            -scheme MarkLook \
            -configuration Debug \
            -derivedDataPath .build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Validate build products
        run: |
          test -d .build/DerivedData/Build/Products/Debug/MarkLook.app
          test -d .build/DerivedData/Build/Products/Debug/MarkLook.app/Contents/PlugIns/MarkLookPreview.appex
          test -d .build/DerivedData/Build/Products/Debug/MarkLook.app/Contents/PlugIns/MarkLookThumbnail.appex
          Scripts/validate-built-bundle.sh .build/DerivedData/Build/Products/Debug/MarkLook.app
      - name: Validate MarkdownCore renderer security fixture
        run: |
          cd Packages/MarkdownCore
          MARKLOOK_RENDERER_SECURITY_FIXTURE=/tmp/marklook-renderer-safe.html swift test
          cd ../..
          Scripts/validate-renderer-security.sh /tmp/marklook-renderer-safe.html
      - name: Validate preview rendering boundaries
        run: |
          ! git grep -n "import WebKit" -- Packages/MarkdownCore Shared ThumbnailExtension MarkLookApp
          ! git grep -n "import AppKit" -- Packages/MarkdownCore
          git grep -n "import WebKit" -- PreviewExtension
          ! git grep -n "allowRawHTML" -- MarkLookApp PreviewExtension ThumbnailExtension Shared Packages/MarkdownCore Scripts project.yml
          ! git grep -n "allowRemoteResources" -- MarkLookApp PreviewExtension ThumbnailExtension Shared Packages/MarkdownCore Scripts project.yml
          ! git grep -n "Data(contentsOf:" -- PreviewExtension
