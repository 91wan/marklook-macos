name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow YAML
        run: ruby -e "require 'yaml'; YAML.load_file('.github/workflows/ci.yml')"
      - name: Validate required scaffold files
        run: |
          test -f README.md
          test -f README_ZH.md
          grep -q "README_ZH.md" README.md
          grep -q "README.md" README_ZH.md
          test -f CHANGELOG.md
          test -f LICENSE
          test -f PRIVACY.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CODEOWNERS
          test -f project.yml
          test -f Docs/architecture.md
          test -f Docs/review-checklist.md
          test -f Docs/manual-validation.md
          test -f Docs/release-checklist.md
          test -f Docs/public-evidence-policy.md
          test -f Docs/performance-notes-v0.1.0.md
          test -f Docs/manual-validation-log-v0.1.0.md
          test -f Docs/known-limitations-v0.1.0.md
          test -f Docs/v0.1.0-release-gate.md
          test -f Docs/signing-notarization.md
          test -f Docs/developer-id-release-lane.md
          test -f Docs/public-binary-release-checklist.md
          test -f Docs/github-release-draft-v0.1.0.md
          test -f Docs/homebrew-cask-draft.rb
          test -f Docs/signing-and-plugin-validation.md
          test -f Docs/adr/ADR-0001-modern-quicklook-extension.md
          test -f Docs/adr/ADR-0002-markdown-engine.md
          test -f Docs/adr/ADR-0003-security-model.md
          test -f MarkLookApp/Info.plist
          test -f MarkLookAppTests/Info.plist
          test -f PreviewExtensionTests/Info.plist
          test -f ThumbnailExtensionTests/Info.plist
          test -f MarkLookApp/MarkLook.entitlements
          test -f Scripts/validate-diagnostics-boundaries.sh
          test -f Scripts/validate-supported-types.sh
          test -f Tests/Scripts/supported-types-test.sh
          test -f Scripts/validate-version-consistency.rb
          test -f Scripts/validate-built-bundle.sh
          test -f Scripts/validate-built-uti-declarations.rb
          test -f Scripts/validate-quicklook-preview-contract.sh
          test -f Scripts/validate-thumbnail-boundaries.sh
          test -f Scripts/validate-renderer-security.sh
          test -f Scripts/validate-signed-quicklook.sh
          test -f Scripts/validate-public-repo-privacy.sh
          test -f Scripts/validate-log-privacy.sh
          test -f Scripts/validate-package-artifact.sh
          test -f Scripts/validate-developer-id-artifact.sh
          test -f Scripts/validate-release-candidate.sh
          test -f Scripts/validate-v0.1.0-release-candidate.sh
          test -f Scripts/diagnose-quicklook-selection.sh
          test -f Scripts/diagnose-thumbnail-selection.sh
          test -f Scripts/build-local-apple-development.sh
          test -f Scripts/doctor-signing.sh
          test -f Scripts/doctor-release-identity.sh
          test -f Scripts/package-developer-id.sh
          test -f Tests/Scripts/version-consistency-test.sh
          test -f Tests/Scripts/log-privacy-test.sh
          test -f Tests/Scripts/built-uti-declarations-test.sh
      - name: Validate plists and entitlements
        run: |
          plutil -lint MarkLookApp/Info.plist
          plutil -lint MarkLookAppTests/Info.plist
          plutil -lint PreviewExtensionTests/Info.plist
          plutil -lint ThumbnailExtensionTests/Info.plist
          plutil -lint MarkLookApp/MarkLook.entitlements
          plutil -lint PreviewExtension/Info.plist
          plutil -lint PreviewExtension/PreviewExtension.entitlements
          plutil -lint ThumbnailExtension/Info.plist
          plutil -lint ThumbnailExtension/ThumbnailExtension.entitlements
          /usr/libexec/PlistBuddy -c 'Print :com.apple.security.app-sandbox' MarkLookApp/MarkLook.entitlements | grep -q true
          /usr/libexec/PlistBuddy -c 'Print :com.apple.security.files.user-selected.read-only' MarkLookApp/MarkLook.entitlements | grep -q true
          /usr/libexec/PlistBuddy -c 'Print :com.apple.security.app-sandbox' PreviewExtension/PreviewExtension.entitlements | grep -q true
          /usr/libexec/PlistBuddy -c 'Print :com.apple.security.app-sandbox' ThumbnailExtension/ThumbnailExtension.entitlements | grep -q true
          Scripts/validate-supported-types.sh
          Scripts/validate-quicklook-preview-contract.sh
          Scripts/validate-thumbnail-boundaries.sh
          Scripts/validate-version-consistency.rb
          ! grep -R "com.apple.security.network.client" . --include="*.entitlements"
          ! grep -R "public.plain-text" PreviewExtension ThumbnailExtension
      - name: Validate shell scripts
        run: |
          sh -n Scripts/bootstrap.sh
          sh -n Scripts/reset-quicklook.sh
          sh -n Scripts/diagnose-file.sh
          sh -n Scripts/package-debug.sh
          sh -n Scripts/package-developer-id.sh
          sh -n Scripts/validate-package-artifact.sh
          sh -n Scripts/validate-developer-id-artifact.sh
          sh -n Scripts/validate-release-candidate.sh
          sh -n Scripts/validate-v0.1.0-release-candidate.sh
          sh -n Scripts/validate-diagnostics-boundaries.sh
          sh -n Scripts/validate-supported-types.sh
          sh -n Scripts/validate-built-bundle.sh
          sh -n Scripts/validate-quicklook-preview-contract.sh
          sh -n Scripts/validate-thumbnail-boundaries.sh
          sh -n Scripts/validate-renderer-security.sh
          sh -n Scripts/validate-signed-quicklook.sh
          sh -n Scripts/validate-public-repo-privacy.sh
          sh -n Scripts/validate-log-privacy.sh
          sh -n Scripts/diagnose-quicklook-selection.sh
          sh -n Scripts/diagnose-thumbnail-selection.sh
          sh -n Scripts/build-local-apple-development.sh
          sh -n Scripts/doctor-signing.sh
          sh -n Scripts/doctor-release-identity.sh
          sh -n Tests/Scripts/package-debug-test.sh
          sh -n Tests/Scripts/developer-id-release-lane-test.sh
          sh -n Tests/Scripts/release-candidate-gate-test.sh
          sh -n Tests/Scripts/v0.1-release-gate-test.sh
          sh -n Tests/Scripts/quicklook-preview-contract-test.sh
          sh -n Tests/Scripts/validate-signed-quicklook-mode-test.sh
          sh -n Tests/Scripts/public-repo-privacy-test.sh
          sh -n Tests/Scripts/supported-types-test.sh
          sh -n Tests/Scripts/built-uti-declarations-test.sh
          sh -n Tests/Scripts/version-consistency-test.sh
          ruby -c Scripts/validate-built-uti-declarations.rb
          ruby -c Scripts/validate-version-consistency.rb
          sh -n Tests/Scripts/log-privacy-test.sh
      - name: Validate packaging scripts
        run: Tests/Scripts/package-debug-test.sh
      - name: Validate Developer ID release lane scripts
        run: Tests/Scripts/developer-id-release-lane-test.sh
      - name: Validate release gate script
        run: Tests/Scripts/release-candidate-gate-test.sh
      - name: Validate version consistency gate
        run: Tests/Scripts/version-consistency-test.sh
      - name: Validate v0.1.0 release gate wrapper
        run: Tests/Scripts/v0.1-release-gate-test.sh
      - name: Validate Quick Look preview contract
        run: Tests/Scripts/quicklook-preview-contract-test.sh
      - name: Validate signed Quick Look script modes
        run: Tests/Scripts/validate-signed-quicklook-mode-test.sh
      - name: Validate public repo privacy
        run: |
          Tests/Scripts/public-repo-privacy-test.sh
          Scripts/validate-public-repo-privacy.sh
          Scripts/validate-public-repo-privacy.sh --archive
      - name: Validate OSLog filename privacy
        run: Tests/Scripts/log-privacy-test.sh
      - name: Validate thumbnail boundaries
        run: Scripts/validate-thumbnail-boundaries.sh
      - name: Validate diagnostics boundaries
        run: Scripts/validate-diagnostics-boundaries.sh
      - name: Validate supported type routing gate
        run: Tests/Scripts/supported-types-test.sh
      - name: Validate built UTI declaration gate
        run: Tests/Scripts/built-uti-declarations-test.sh
      - name: Check whitespace
        run: git diff --check
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Validate Developer ID package dry run
        run: Scripts/package-developer-id.sh --dry-run
      - name: Validate XcodeGen spec syntax
        run: xcodegen dump --spec project.yml >/tmp/marklook-project-dump.yml
      - name: Generate Xcode project
        run: xcodegen generate
      - name: List Xcode project
        run: xcodebuild -project MarkLook.xcodeproj -list
      - name: Test MarkLook extensions
        run: |
          xcodebuild \
            -project MarkLook.xcodeproj \
            -scheme MarkLook \
            -configuration Debug \
            -derivedDataPath .build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            test
      - name: Build MarkLook
        run: |
          xcodebuild \
            -project MarkLook.xcodeproj \
            -scheme MarkLook \
            -configuration Debug \
            -derivedDataPath .build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Validate build products
        run: |
          test -d .build/DerivedData/Build/Products/Debug/MarkLook.app
          test -d .build/DerivedData/Build/Products/Debug/MarkLook.app/Contents/PlugIns/MarkLookPreview.appex
          test -d .build/DerivedData/Build/Products/Debug/MarkLook.app/Contents/PlugIns/MarkLookThumbnail.appex
          Scripts/validate-built-bundle.sh .build/DerivedData/Build/Products/Debug/MarkLook.app
      - name: Validate MarkdownCore renderer security fixture
        run: |
          cd Packages/MarkdownCore
          MARKLOOK_RENDERER_SECURITY_FIXTURE=/tmp/marklook-renderer-safe.html swift test
          cd ../..
          Scripts/validate-renderer-security.sh /tmp/marklook-renderer-safe.html
      - name: Validate preview rendering boundaries
        run: |
          ! git grep -n "import WebKit" -- MarkLookApp PreviewExtension ThumbnailExtension Shared Packages/MarkdownCore
          ! git grep -n "WKWebView" -- MarkLookApp PreviewExtension ThumbnailExtension Shared Packages/MarkdownCore
          ! git grep -n "import AppKit" -- Packages/MarkdownCore
          git grep -n "providePreview" -- PreviewExtension/PreviewViewController.swift
          ! git grep -n "preparePreviewOfFile" -- PreviewExtension
          ! git grep -n "allowRawHTML" -- MarkLookApp PreviewExtension ThumbnailExtension Shared Packages/MarkdownCore Scripts project.yml
          ! git grep -n "allowRemoteResources" -- MarkLookApp PreviewExtension ThumbnailExtension Shared Packages/MarkdownCore Scripts project.yml
          ! git grep -n "Data(contentsOf:" -- PreviewExtension
      - name: Validate release candidate gate
        run: Scripts/validate-release-candidate.sh --ci
